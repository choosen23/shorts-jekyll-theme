<article class="post-card">
  <a href="{{ include.post.url | relative_url }}" class="post-card-link">
    <div class="post-card-image">
      {% if include.post.cover_image %}
      <img src="{{ include.post.cover_image }}" alt="{{ include.post.title }}" class="post-card-image-actual" loading="lazy">
      {% else %}
      <div class="post-card-image-placeholder"></div>
      {% endif %}
    </div>
    <div class="post-card-body">
      {% if include.post.categories %}
      <span class="post-card-category">{{ include.post.categories | first }}</span>
      {% endif %}
      <h3 class="post-card-title">{{ include.post.title }}</h3>
      <div class="post-card-meta">
        <time>{{ include.post.date | date: "%b %d" }}</time>
        {% if include.post.reading_time %}
        <span class="meta-sep">&middot;</span>
        <span>{{ include.post.reading_time }} min</span>
        {% endif %}
      </div>
    </div>
  </a>
</article>
